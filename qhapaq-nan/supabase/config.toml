# Configuración local de Supabase para desarrollo.
# Para producción, configurar en https://app.supabase.com.

project_id = "qhapaq-nan"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://localhost:54321"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://qhapaq-nan.vercel.app"
additional_redirect_urls = ["http://localhost:3000/auth/callback", "https://qhapaq-nan.vercel.app/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false  # En dev no confirmamos email

[auth.email.template.magic_link]
subject = "Tu enlace para entrar a Qhapaq Ñan"
content_path = "./supabase/templates/magic_link.html"

# Para producción, configurar SMTP custom (Resend) en
# Authentication → Settings → SMTP Settings.

[edge_runtime]
enabled = true
inspector_port = 8083
